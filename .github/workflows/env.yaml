name: Environment Setup
on: workflow_dispatch
#env is used to define the environment variables that will be used in the workflow and 
#in this case we are defining an environment variable called APP_ENVIRONMENT and we are setting its value to production
#Also this is a workflow level environment variable which means that it will be available to all the jobs and steps in the workflow 
#and we can use this environment variable in any job or step in the workflow by using the syntax ${{ env.VARIABLE_NAME }}
env:
  APP_ENVIRONMENT: build
jobs:
     #this is a job level environment variable which means that it will only be available to this job and it will override the workflow level environment variable for this job and we can use this environment variable in this job by using the syntax ${{ env.VARIABLE_NAME }}
     env:
        APP_ENVIRONMENT: testing
  
    environment-setup:
     runs-on: ubuntu-latest
     steps:
      - name: Connecting to environment
        #This is a step level environment variable which means that it will only be available to this step and it will override the workflow level environment variable for this step and we can use this environment variable in this step by using the syntax ${{ env.VARIABLE_NAME }} 
        env:
          APP_ENVIRONMENT: testing
        run: echo "Connecting to the environment to ${{ env.APP_ENVIRONMENT }} environment"
