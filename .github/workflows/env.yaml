name: Environment Setup
on: workflow_dispatch
jobs:
  environment-setup:
    # this is a job level environment variable, only available to this job
    # it overrides the workflow level variable for this job
    env:
      APP_ENVIRONMENT: testing
    runs-on: ubuntu-latest
    steps:
      - name: Connecting to environment
        # this is a step level environment variable, only available to this step
        # it overrides the workflow/job level variable for this step
        env:
          APP_ENVIRONMENT: testing
        run: echo "Connecting to the environment to ${{ env.APP_ENVIRONMENT }} environment"
