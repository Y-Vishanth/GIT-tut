name: GitHub actions demo
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Creating the Context variables
        run: |
          echo "{{ toJson(github) }}"
          echo "This repo is owned by ${{ github.repository_owner }}"
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Print index.html content
        run: cat index.html
  test:
      needs: build
      runs-on: ubuntu-latest
      steps:
        - name: Checking the test file
          run: echo "This is a test file"
