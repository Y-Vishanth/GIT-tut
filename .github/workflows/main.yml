name: Hello world
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build step 
        run: echo "This is a build step"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test step 
        run: echo "This is a test step"
  deploy:
    runs-on: ubuntu-latest 
    needs: test
    steps:
      - name: Deploy step 
        run: echo "This is a deploy step"
      
